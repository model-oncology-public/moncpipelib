# Publishes moncpipelib to PyPI via Trusted Publishing (OIDC) -- no API token.
#
# Runs in the PUBLIC repo (a non-EMU org). Generated into the public tree by
# the private export tooling; do not hand-edit in the public repo.
#
# Invoked two ways:
#   * automatically by release.yml (workflow_call) right after it cuts a Release
#     for a newly-mirrored version, and
#   * directly on `release: published` or manual `workflow_dispatch`.
#
# One-time PyPI setup (https://pypi.org/manage/project/moncpipelib/settings/publishing/):
#   Add a Trusted Publisher:
#     Owner:        model-oncology-public
#     Repository:   moncpipelib
#     Workflow:     publish-pypi.yml   # the reusable file below; matched via job_workflow_ref
#     Environment:  pypi
#
# PyPI rejects re-uploading an existing version, so each publish needs a new
# version (bumped in the internal repo, carried over by the mirror).
name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_call:
    inputs:
      ref:
        description: Git ref (tag) to build and publish.
        required: false
        type: string
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Build sdist + wheel
        run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # OIDC token for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish
        # NOTE: pin to the COMMIT sha, not the annotated-tag-object sha, or
        # Actions mis-resolves it to a non-existent ghcr.io image tag.
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
